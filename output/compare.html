function renderCards(sites, containerId, isPersonal) {
  const grid = document.getElementById(containerId);
  sites.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card';
    const imgSrc = isPersonal ? `/${s.slug}/photo_1.jpg` : '';
    card.innerHTML = `
      <a href="/${s.slug}/" target="_blank">
        ${isPersonal
          ? `<img class="card-img" src="${imgSrc}" alt="${s.name}" onerror="this.src='https://images.unsplash.com/photo-1497366216548-37526070297c?w=400'">`
          : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;color:#666;font-size:0.9em;">תמונות Unsplash גנריות</div>`
        }
        <div class="card-body">
          <div class="card-name">${s.name}</div>
          <span class="card-badge ${isPersonal ? 'badge-personal' : 'badge-generic'}">${isPersonal ? 'אישי' : 'גנרי'}</span>
          ${s.photos ? `<span class="badge-photos"> · ${s.photos} תמונות</span>` : ''}
        </div>
      </a>
    `;
    grid.appendChild(card);
  });
}
