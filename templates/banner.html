<!-- Lead Preview Banner -->
<style>
  .lp-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 99999;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    font-family: 'Heebo', sans-serif;
    direction: rtl;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.4s ease;
  }
  .lp-banner.lp-hidden {
    transform: translateY(-100%);
  }
  .lp-banner-text {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .lp-banner-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    padding: 8px 22px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
  }
  .lp-banner-cta:hover {
    background: #1ebe5d;
    transform: scale(1.05);
  }
  .lp-banner-close {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    transition: color 0.2s;
  }
  .lp-banner-close:hover {
    color: #fff;
  }
  body {
    padding-top: 62px !important;
  }
  @media (max-width: 600px) {
    .lp-banner {
      padding: 10px 14px;
      gap: 10px;
    }
    .lp-banner-text {
      font-size: 13px;
      text-align: center;
    }
    .lp-banner-cta {
      font-size: 13px;
      padding: 7px 18px;
    }
  }
</style>
