<!-- Lead Preview Banner — Urgency + Timer -->
<style>
  .lp-banner {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 99999;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    font-family: 'Heebo', sans-serif;
    direction: rtl;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.4s ease;
  }
  .lp-banner.lp-hidden {
    transform: translateY(-100%);
  }
  .lp-banner-text {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }
  .lp-banner-timer {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(239,68,68,0.2);
    border: 1px solid rgba(239,68,68,0.4);
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 14px;
    font-weight: 700;
    color: #fca5a5;
    font-variant-numeric: tabular-nums;
    direction: ltr;
  }
  .lp-banner-timer .fire { animation: pulse-fire 1s infinite; }
  @keyframes pulse-fire { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .lp-banner-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #25D366;
    color: #fff;
    text-decoration: none;
    padding: 8px 22px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 700;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
    animation: cta-glow 2s ease-in-out infinite;
  }
  @keyframes cta-glow {
    0%,100%{box-shadow:0 0 8px rgba(37,211,102,0.3)} 50%{box-shadow:0 0 20px rgba(37,211,102,0.6)}
  }
  .lp-banner-cta:hover {
    background: #1ebe5d;
    transform: scale(1.05);
  }
  .lp-banner-close {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    transition: color 0.2s;
  }
  .lp-banner-close:hover {
    color: #fff;
  }
  body {
    padding-top: 62px !important;
  }
  @media (max-width: 600px) {
    .lp-banner {
      padding: 10px 14px;
      gap: 8px;
    }
    .lp-banner-text {
      font-size: 12px;
      text-align: center;
    }
    .lp-banner-timer { font-size: 12px; padding: 3px 8px; }
    .lp-banner-cta {
      font-size: 13px;
      padding: 7px 18px;
    }
  }
</style>
<div class="lp-banner" id="lpBanner">
  <span class="lp-banner-text">
    🎉 מבצע השקה — הקמת אתר ב-<strong style="text-decoration:line-through;color:#fca5a5">1,990 ₪</strong> <strong style="color:#4ade80">990 ₪</strong> בלבד!
  </span>
  <span class="lp-banner-timer">
    <span class="fire">🔥</span>
    <span id="bannerTimer">23:59:59</span>
  </span>
  <a class="lp-banner-cta" href="#pricing" onclick="trackClick&&trackClick('banner_cta','pricing')">
    רוצה להתחיל →
  </a>
  <button class="lp-banner-close" onclick="document.getElementById('lpBanner').classList.add('lp-hidden');document.body.style.paddingTop='0'" aria-label="סגור">&times;</button>
</div>
<script>
(function(){
  // Countdown timer — resets daily at midnight, creates urgency
  var key = 'lp_timer_' + location.pathname;
  var stored = localStorage.getItem(key);
  var deadline;
  if (stored && parseInt(stored) > Date.now()) {
    deadline = parseInt(stored);
  } else {
    // Set deadline to end of today (midnight)
    var now = new Date();
    deadline = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).getTime();
    localStorage.setItem(key, deadline);
  }
  function updateTimer() {
    var diff = deadline - Date.now();
    if (diff <= 0) {
      // Reset for another 24h
      deadline = Date.now() + 86400000;
      localStorage.setItem(key, deadline);
      diff = deadline - Date.now();
    }
    var h = Math.floor(diff / 3600000);
    var m = Math.floor((diff % 3600000) / 60000);
    var s = Math.floor((diff % 60000) / 1000);
    var el = document.getElementById('bannerTimer');
    if (el) el.textContent = (h<10?'0':'') + h + ':' + (m<10?'0':'') + m + ':' + (s<10?'0':'') + s;
  }
  updateTimer();
  setInterval(updateTimer, 1000);
})();
</script>
<!-- End Banner -->
